apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-training
spec:
  template:
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["capacity-block"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["${training_instance_type}"]
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: gpu-training
  limits:
    nvidia.com/gpu: ${max_training_gpus}
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 5m
