apiVersion: batch/v1
kind: Job
metadata:
  name: amr-stage6-train-evaluate
  namespace: ${NAMESPACE}
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 43200
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: amr-pipeline-sa
      imagePullSecrets:
        - name: ngc-secret
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        karpenter.k8s.aws/instance-category: "p"
      containers:
        - name: train-evaluate
          image: ${XMOBILITY_IMAGE_URI}
          command:
            - python
            - /scripts/stage6_train_evaluate.py
          args:
            - "--s3_bucket"
            - "${S3_BUCKET}"
            - "--run_id"
            - "${RUN_ID}"
            - "--pretrain_epochs"
            - "${PRETRAIN_EPOCHS:-10}"
            - "--train_epochs"
            - "${TRAIN_EPOCHS:-10}"
          resources:
            requests:
              nvidia.com/gpu: 8
              cpu: "192"
              memory: "2048Gi"
            limits:
              nvidia.com/gpu: 8
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: output
              mountPath: /output
            - name: input
              mountPath: /input
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 512Gi
        - name: output
          emptyDir: {}
        - name: input
          emptyDir: {}
