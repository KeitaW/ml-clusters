apiVersion: osmo.nvidia.com/v1
kind: Workflow
metadata:
  name: amr-navigation-pipeline
  namespace: ${NAMESPACE}
spec:
  pool: simulation
  priority: medium
  tasks:
    - name: scene-setup
      image: ${ISAAC_SIM_IMAGE_URI}
      imagePullSecrets:
        - ngc-secret
      command:
        - /isaac-sim/python.sh
        - /isaac-sim/scripts/stage1_scene_setup.py
        - --s3_bucket
        - "${S3_BUCKET}"
        - --run_id
        - "${RUN_ID}"
        - --headless
      env:
        ACCEPT_EULA: "Y"
        PRIVACY_CONSENT: "Y"
      resources:
        gpu: 1
        cpu: 16
        memory: 32Gi
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        karpenter.k8s.aws/instance-category: "g"
      schedulerName: kai-scheduler
      serviceAccountName: amr-pipeline-sa
      volumes:
        - name: cache
          mountPath: /isaac-sim/.cache
          emptyDir:
            sizeLimit: 50Gi
        - name: shm
          mountPath: /dev/shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
        - name: output
          mountPath: /output
          emptyDir: {}
        - name: input
          mountPath: /input
          emptyDir: {}
      timeout: 1800

    - name: occupancy-map
      inputs: [scene-setup]
      image: ${ISAAC_SIM_IMAGE_URI}
      imagePullSecrets:
        - ngc-secret
      command:
        - /isaac-sim/python.sh
        - /isaac-sim/scripts/stage2_occupancy_map.py
        - --s3_bucket
        - "${S3_BUCKET}"
        - --run_id
        - "${RUN_ID}"
        - --headless
      env:
        ACCEPT_EULA: "Y"
        PRIVACY_CONSENT: "Y"
      resources:
        gpu: 1
        cpu: 16
        memory: 32Gi
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        karpenter.k8s.aws/instance-category: "g"
      schedulerName: kai-scheduler
      serviceAccountName: amr-pipeline-sa
      volumes:
        - name: cache
          mountPath: /isaac-sim/.cache
          emptyDir:
            sizeLimit: 50Gi
        - name: shm
          mountPath: /dev/shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
        - name: output
          mountPath: /output
          emptyDir: {}
        - name: input
          mountPath: /input
          emptyDir: {}
      timeout: 1800

    - name: trajectory-gen
      inputs: [occupancy-map]
      image: ${ISAAC_SIM_IMAGE_URI}
      imagePullSecrets:
        - ngc-secret
      command:
        - /isaac-sim/python.sh
        - /isaac-sim/scripts/stage3_trajectory_gen.py
        - --s3_bucket
        - "${S3_BUCKET}"
        - --run_id
        - "${RUN_ID}"
        - --num_trajectories
        - "${NUM_TRAJECTORIES:-10}"
        - --headless
      env:
        ACCEPT_EULA: "Y"
        PRIVACY_CONSENT: "Y"
      resources:
        gpu: 1
        cpu: 16
        memory: 32Gi
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        karpenter.k8s.aws/instance-category: "g"
      schedulerName: kai-scheduler
      serviceAccountName: amr-pipeline-sa
      volumes:
        - name: cache
          mountPath: /isaac-sim/.cache
          emptyDir:
            sizeLimit: 50Gi
        - name: shm
          mountPath: /dev/shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
        - name: output
          mountPath: /output
          emptyDir: {}
        - name: input
          mountPath: /input
          emptyDir: {}
      timeout: 3600

    - name: render
      inputs: [trajectory-gen]
      image: ${ISAAC_SIM_IMAGE_URI}
      imagePullSecrets:
        - ngc-secret
      command:
        - /isaac-sim/python.sh
        - /isaac-sim/scripts/stage4_render.py
        - --s3_bucket
        - "${S3_BUCKET}"
        - --run_id
        - "${RUN_ID}"
        - --headless
      env:
        ACCEPT_EULA: "Y"
        PRIVACY_CONSENT: "Y"
      resources:
        gpu: 1
        cpu: 16
        memory: 32Gi
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        karpenter.k8s.aws/instance-category: "g"
      schedulerName: kai-scheduler
      serviceAccountName: amr-pipeline-sa
      volumes:
        - name: cache
          mountPath: /isaac-sim/.cache
          emptyDir:
            sizeLimit: 50Gi
        - name: shm
          mountPath: /dev/shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
        - name: output
          mountPath: /output
          emptyDir: {}
        - name: input
          mountPath: /input
          emptyDir: {}
      timeout: 7200

    - name: domain-augment
      inputs: [render]
      image: ${COSMOS_IMAGE_URI}
      imagePullSecrets:
        - ngc-secret
      command:
        - python
        - /scripts/stage5_domain_augment.py
        - --s3_bucket
        - "${S3_BUCKET}"
        - --run_id
        - "${RUN_ID}"
      resources:
        gpu: 1
        cpu: 16
        memory: 32Gi
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        karpenter.k8s.aws/instance-category: "g"
      schedulerName: kai-scheduler
      serviceAccountName: amr-pipeline-sa
      volumes:
        - name: output
          mountPath: /output
          emptyDir: {}
        - name: input
          mountPath: /input
          emptyDir: {}
      timeout: 7200

    - name: train-evaluate
      inputs: [render, domain-augment]
      image: ${XMOBILITY_IMAGE_URI}
      imagePullSecrets:
        - ngc-secret
      command:
        - python
        - /scripts/stage6_train_evaluate.py
        - --s3_bucket
        - "${S3_BUCKET}"
        - --run_id
        - "${RUN_ID}"
      resources:
        gpu: 1
        cpu: 16
        memory: 64Gi
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        karpenter.k8s.aws/instance-category: "p"
      schedulerName: kai-scheduler
      serviceAccountName: amr-pipeline-sa
      volumes:
        - name: output
          mountPath: /output
          emptyDir: {}
        - name: input
          mountPath: /input
          emptyDir: {}
      # Checkpoint support: training saves checkpoints to S3 after each epoch
      # and can be resumed on reschedule.
      exitAction: reschedule
      timeout: 14400
