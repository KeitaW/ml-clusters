apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: adot-collector
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: 0.108.0
    helm:
      values: |
        mode: deployment
        replicaCount: 2
        image:
          repository: public.ecr.aws/aws-observability/aws-otel-collector
          tag: v0.41.1
        serviceAccount:
          create: true
          name: adot-collector
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::483026362307:role/ADOTCollectorRole
        clusterRole:
          create: true
          rules:
            - apiGroups: [""]
              resources: ["nodes", "nodes/metrics", "nodes/proxy", "services", "endpoints", "pods"]
              verbs: ["get", "list", "watch"]
            - apiGroups: [""]
              resources: ["configmaps"]
              verbs: ["get"]
            - apiGroups: ["networking.k8s.io"]
              resources: ["ingresses"]
              verbs: ["get", "list", "watch"]
            - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
              verbs: ["get"]
        config:
          extensions:
            sigv4auth:
              region: us-east-1
              service: aps
          receivers:
            prometheus:
              config:
                scrape_configs:
                  - job_name: kubernetes-pods
                    scrape_interval: 30s
                    kubernetes_sd_configs:
                      - role: pod
                    relabel_configs:
                      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                        action: keep
                        regex: "true"
                      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                        action: replace
                        target_label: __metrics_path__
                        regex: (.+)
                      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                        action: replace
                        regex: (.+):(\d+);(\d+)
                        replacement: $${1}:$${3}
                        target_label: __address__
                      - source_labels: [__meta_kubernetes_namespace]
                        action: replace
                        target_label: namespace
                      - source_labels: [__meta_kubernetes_pod_name]
                        action: replace
                        target_label: pod
                  - job_name: kubernetes-nodes-cadvisor
                    scrape_interval: 30s
                    scheme: https
                    tls_config:
                      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                      insecure_skip_verify: true
                    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                    kubernetes_sd_configs:
                      - role: node
                    relabel_configs:
                      - action: labelmap
                        regex: __meta_kubernetes_node_label_(.+)
                      - target_label: __address__
                        replacement: kubernetes.default.svc:443
                      - source_labels: [__meta_kubernetes_node_name]
                        regex: (.+)
                        target_label: __metrics_path__
                        replacement: /api/v1/nodes/$${1}/proxy/metrics/cadvisor
          exporters:
            prometheusremotewrite:
              endpoint: https://aps-workspaces.us-east-1.amazonaws.com/workspaces/ws-b230cb85-8264-40fa-99d2-33cfc127307a/api/v1/remote_write
              auth:
                authenticator: sigv4auth
          service:
            extensions: [sigv4auth]
            pipelines:
              metrics:
                receivers: [prometheus]
                exporters: [prometheusremotewrite]
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: opentelemetry
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
