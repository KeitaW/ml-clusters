apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
spec:
  project: default
  source:
    repoURL: public.ecr.aws/karpenter
    chart: karpenter
    targetRevision: 1.2.1
    helm:
      values: |
        replicas: 2
        settings:
          clusterName: ml-training-main-us-east-1
          interruptionQueue: Karpenter-ml-training-main-us-east-1
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
