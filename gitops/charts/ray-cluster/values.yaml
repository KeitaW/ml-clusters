clusterName: ""
rayRoleArn: ""
s3CheckpointPath: ""

head:
  replicas: 1
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
  rayStartParams:
    num-cpus: "0"
    dashboard-host: "0.0.0.0"

gpuWorkerGroup:
  replicas: 0
  minReplicas: 0
  maxReplicas: 8
  nodeSelector: {}
  resources:
    requests:
      cpu: "90"
      memory: "900Gi"
      nvidia.com/gpu: "8"
    limits:
      cpu: "96"
      memory: "1024Gi"
      nvidia.com/gpu: "8"
  rayStartParams:
    num-gpus: "8"
