apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: ray-cluster
  namespace: {{ .Release.Namespace }}
spec:
  rayVersion: '2.41.0'
  enableInTreeAutoscaling: true
  autoscalerOptions:
    upscalingMode: Default
    idleTimeoutSeconds: 300
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  headGroupSpec:
    serviceType: ClusterIP
    rayStartParams:
      {{- range $key, $val := .Values.head.rayStartParams }}
      {{ $key }}: {{ $val | quote }}
      {{- end }}
    template:
      metadata:
        labels:
          app.kubernetes.io/name: ray-cluster
          app.kubernetes.io/component: head
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "8080"
      spec:
        serviceAccountName: ray-cluster
        nodeSelector:
          kubernetes.io/arch: amd64
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: node.kubernetes.io/instance-type
                      operator: In
                      values:
                        - m5.xlarge
                        - m5.2xlarge
                        - m5.4xlarge
        tolerations:
          - key: "ray.io/head"
            operator: "Exists"
            effect: "NoSchedule"
        containers:
          - name: ray-head
            image: rayproject/ray:2.41.0
            resources:
              requests:
                cpu: {{ .Values.head.resources.requests.cpu | quote }}
                memory: {{ .Values.head.resources.requests.memory | quote }}
              limits:
                cpu: {{ .Values.head.resources.limits.cpu | quote }}
                memory: {{ .Values.head.resources.limits.memory | quote }}
            ports:
              - containerPort: 6379
                name: gcs-server
              - containerPort: 8265
                name: dashboard
              - containerPort: 10001
                name: client
              - containerPort: 8080
                name: metrics
            env:
              - name: RAY_GRAFANA_IFRAME_HOST
                value: ""
              - name: RAY_GRAFANA_HOST
                value: ""
            volumeMounts:
              - mountPath: /tmp/ray
                name: ray-logs
        volumes:
          - name: ray-logs
            emptyDir: {}
  workerGroupSpecs:
    - groupName: gpu-workers
      replicas: {{ .Values.gpuWorkerGroup.replicas }}
      minReplicas: {{ .Values.gpuWorkerGroup.minReplicas }}
      maxReplicas: {{ .Values.gpuWorkerGroup.maxReplicas }}
      rayStartParams:
        {{- range $key, $val := .Values.gpuWorkerGroup.rayStartParams }}
        {{ $key }}: {{ $val | quote }}
        {{- end }}
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ray-cluster
            app.kubernetes.io/component: gpu-worker
        spec:
          serviceAccountName: ray-cluster
          {{- if .Values.gpuWorkerGroup.nodeSelector }}
          nodeSelector:
            {{- toYaml .Values.gpuWorkerGroup.nodeSelector | nindent 12 }}
          {{- end }}
          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Exists"
              effect: "NoSchedule"
            - key: "sagemaker.amazonaws.com/hyperpod"
              operator: "Exists"
              effect: "NoSchedule"
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: ray-cluster
                  app.kubernetes.io/component: gpu-worker
          containers:
            - name: ray-worker
              image: rayproject/ray:2.41.0
              resources:
                {{- toYaml .Values.gpuWorkerGroup.resources | nindent 16 }}
              env:
                - name: NCCL_DEBUG
                  value: "WARN"
              volumeMounts:
                - mountPath: /tmp/ray
                  name: ray-logs
                - mountPath: /dev/shm
                  name: dshm
          volumes:
            - name: ray-logs
              emptyDir: {}
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 64Gi
