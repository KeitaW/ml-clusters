---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: osmo-gpu
spec:
  instanceProfile: {{ .Values.instanceProfileName }}
  amiSelectorTerms:
    - alias: al2023@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery/{{ .Values.clusterName }}: "true"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName }}
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 500Gi
        volumeType: gp3
        iops: 10000
        throughput: 500
        encrypted: true
  instanceStorePolicy: RAID0
  userData: |
    #!/bin/bash
    echo "Configuring instance store for OSMO GPU nodes..."
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: osmo-cpu
spec:
  instanceProfile: {{ .Values.instanceProfileName }}
  amiSelectorTerms:
    - alias: al2023@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery/{{ .Values.clusterName }}: "true"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName }}
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 200Gi
        volumeType: gp3
        iops: 6000
        throughput: 400
        encrypted: true
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: osmo-cpu-system
spec:
  instanceProfile: {{ .Values.instanceProfileName }}
  amiSelectorTerms:
    - alias: al2023@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery/{{ .Values.clusterName }}: "true"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName }}
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        encrypted: true
