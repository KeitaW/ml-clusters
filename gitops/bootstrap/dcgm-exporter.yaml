apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dcgm-exporter
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
          matchExpressions:
            - key: enable_gpu_operator
              operator: DoesNotExist
  template:
    metadata:
      name: 'dcgm-exporter-{{.name}}'
    spec:
      project: default
      source:
        repoURL: https://nvidia.github.io/dcgm-exporter/helm-charts
        chart: dcgm-exporter
        targetRevision: 3.6.0
        helm:
          valuesObject:
            serviceMonitor:
              enabled: false
            podAnnotations:
              prometheus.io/scrape: "true"
              prometheus.io/port: "9400"
              prometheus.io/path: "/metrics"
            tolerations:
              - key: nvidia.com/gpu
                operator: Exists
                effect: NoSchedule
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: karpenter.k8s.aws/instance-gpu-count
                          operator: Exists
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi
      destination:
        server: '{{.server}}'
        namespace: kube-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
