apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: osmo-backend-operator
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - clusters:
        selector:
          matchLabels:
            enable_osmo: "true"
  template:
    metadata:
      name: 'osmo-backend-operator-{{.name}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/NVIDIA/OSMO.git
        targetRevision: v6.2-rc6
        path: deployments/charts/backend-operator
        helm:
          valuesObject:
            serviceAccount:
              create: true
              name: osmo-backend-operator
              annotations:
                eks.amazonaws.com/role-arn: '{{index .metadata.annotations "osmo_role_arn"}}'
            global:
              agentNamespace: osmo-system
              backendNamespace: osmo-system
            config:
              serviceUrl: http://osmo-service.osmo-system.svc.cluster.local:8080
      destination:
        server: '{{.server}}'
        namespace: osmo-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
