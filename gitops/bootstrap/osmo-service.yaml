apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: osmo-service
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - clusters:
        selector:
          matchLabels:
            enable_osmo: "true"
  template:
    metadata:
      name: 'osmo-service-{{.name}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/NVIDIA/OSMO.git
        targetRevision: v6.2-rc6
        path: deployments/charts/service
        helm:
          valuesObject:
            serviceAccount:
              create: true
              name: osmo-service
              annotations:
                eks.amazonaws.com/role-arn: '{{index .metadata.annotations "osmo_role_arn"}}'
            postgresql:
              enabled: false
            redis:
              enabled: false
            externalDatabase:
              host: '{{index .metadata.annotations "osmo_db_endpoint"}}'
              port: '{{index .metadata.annotations "osmo_db_port"}}'
              database: osmo
              existingSecret: db-secret
              existingSecretPasswordKey: db-password
              existingSecretUserKey: db-user
            externalRedis:
              host: '{{index .metadata.annotations "osmo_redis_endpoint"}}'
              port: '{{index .metadata.annotations "osmo_redis_port"}}'
              tls: true
      destination:
        server: '{{.server}}'
        namespace: osmo-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
