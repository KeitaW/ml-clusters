apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: aws-lb-controller
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
  template:
    metadata:
      name: 'aws-lb-controller-{{.name}}'
    spec:
      project: default
      source:
        repoURL: https://aws.github.io/eks-charts
        chart: aws-load-balancer-controller
        targetRevision: 1.11.0
        helm:
          valuesObject:
            clusterName: '{{index .metadata.annotations "cluster_name"}}'
            region: '{{index .metadata.annotations "aws_region"}}'
            vpcId: '{{index .metadata.annotations "vpc_id"}}'
            serviceAccount:
              create: true
              name: aws-load-balancer-controller
              annotations:
                eks.amazonaws.com/role-arn: '{{index .metadata.annotations "alb_controller_role_arn"}}'
      destination:
        server: '{{.server}}'
        namespace: kube-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
