apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: osmo-secrets
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - clusters:
        selector:
          matchLabels:
            enable_osmo: "true"
  template:
    metadata:
      name: 'osmo-secrets-{{.name}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/KeitaW/ml-clusters.git
        targetRevision: main
        path: gitops/charts/osmo-secrets
        helm:
          valuesObject:
            secretArn: '{{index .metadata.annotations "osmo_db_secret_arn"}}'
            roleArn: '{{index .metadata.annotations "osmo_role_arn"}}'
            awsRegion: '{{index .metadata.annotations "aws_region"}}'
      destination:
        server: '{{.server}}'
        namespace: osmo-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
