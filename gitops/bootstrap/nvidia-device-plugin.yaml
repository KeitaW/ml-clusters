apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: nvidia-device-plugin
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
          matchExpressions:
            - key: enable_gpu_operator
              operator: DoesNotExist
  template:
    metadata:
      name: 'nvidia-device-plugin-{{.name}}'
    spec:
      project: default
      source:
        repoURL: https://nvidia.github.io/k8s-device-plugin
        chart: nvidia-device-plugin
        targetRevision: 0.17.0
        helm:
          valuesObject:
            tolerations:
              - key: nvidia.com/gpu
                operator: Exists
                effect: NoSchedule
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: karpenter.k8s.aws/instance-category
                          operator: In
                          values: ["p", "g"]
      destination:
        server: '{{.server}}'
        namespace: kube-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
