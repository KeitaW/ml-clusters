apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: gpu-training
spec:
  role: Karpenter-ml-cluster-main-us-east-1-2026030310540263780000000b
  amiSelectorTerms:
    - alias: al2023@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: ml-cluster-main-us-east-1
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: ml-cluster-main-us-east-1
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 500Gi
        volumeType: gp3
        iops: 10000
        throughput: 500
        encrypted: true
  instanceStorePolicy: RAID0
  userData: |
    #!/bin/bash
    # Mount instance store as /tmp for fast scratch space
    echo "Configuring instance store..."
